name: Apply database migrations

# Migrations must reach production with (or before) the code that depends on them — a deploy that
# lands first will 500 on any query touching a column that doesn't exist yet. This runs on every
# push to main that touches migrations, so schema and code ship together.
#
# The Vercel build races this job, so migrations must stay backward-compatible with the currently
# deployed code: add columns, don't drop or rename them. Removals go in a later migration, after the
# code that used them is gone (expand/contract).

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  # Allows a manual run from the Actions tab, e.g. to apply a migration merged before this workflow
  # existed.
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    # SUPABASE_DB_URL is an environment secret, which is only readable by a job that names the
    # environment. Without this line the secret resolves to an empty string and the job fails with a
    # confusing error rather than a missing-secret one.
    environment: Production
    # Prevents two pushes in quick succession from applying migrations concurrently.
    concurrency:
      group: production-migrations
      cancel-in-progress: false
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      # config.toml interpolates env(RESEND_API_KEY) for SMTP, and the CLI evaluates every env() in
      # it on any command run inside a project directory — including `migration list`, which never
      # sends mail. Only `supabase config push` would apply this value, and this job doesn't run it,
      # so a placeholder satisfies the parser without putting a live Resend key in CI.
      RESEND_API_KEY: unused-by-db-push
    steps:
      - uses: actions/checkout@v4

      # Pinned to the same version as the `supabase` devDependency. `latest` would silently drift
      # from local and apply migrations with a CLI nobody has tested against this schema.
      - uses: supabase/setup-cli@v1
        with:
          version: 1.226.4

      # Fail loudly and specifically, rather than letting the CLI report an empty secret as a DSN
      # parse error or an unroutable host as a generic dial failure.
      - name: Check database URL
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL is empty. It must be an environment secret on the Production"
            echo "environment, and this job must declare 'environment: Production' to read it."
            exit 1
          fi
          case "$SUPABASE_DB_URL" in
            postgresql://*|postgres://*) ;;
            *) echo "SUPABASE_DB_URL is not a Postgres DSN (expected postgresql://...)."; exit 1 ;;
          esac
          case "$SUPABASE_DB_URL" in
            *db.*.supabase.co*)
              echo "SUPABASE_DB_URL is the direct connection, which is IPv6-only. GitHub runners"
              echo "have no IPv6 route. Use the session pooler: pooler.supabase.com:5432"
              exit 1 ;;
            *:6543/*)
              echo "SUPABASE_DB_URL is the transaction pooler (6543), which has no session mode."
              echo "Migrations need the session pooler on port 5432."
              exit 1 ;;
          esac

      - name: Show pending migrations
        run: supabase migration list --db-url "$SUPABASE_DB_URL"

      - name: Apply migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL"
